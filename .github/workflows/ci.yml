name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Keep in sync with rust-toolchain.toml — the pin is what stops local
      # rustfmt/clippy from drifting against CI.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.1
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --check
      - name: Build
        run: cargo build --release
      - name: Clippy
        run: cargo clippy --release --all-targets -- -D warnings
      - name: Test
        run: cargo test --release
      # Full-corpus inflection guard: the command exits nonzero if the paradigm
      # struct path (which the site tables and the forms API render from)
      # diverges from the panic-guarded cell getters on any official lemma.
      - name: Aspect-pair benchmark and frozen-manifest guard
        run: |
          cargo run --release -- aspect-eval
          git diff --exit-code -- target/eval/aspect-pairs.md target/eval/aspect-pairs.tsv
      - name: Aspect production-export guard
        run: |
          rm -rf /tmp/slovowiki-aspect-ci
          cargo run --release -- export --out /tmp/slovowiki-aspect-ci
          python3 tools/validate-aspect-export.py /tmp/slovowiki-aspect-ci
          python3 tools/validate-linguistic-logic.py /tmp/slovowiki-aspect-ci
          node tools/validate-author-tools.mjs /tmp/slovowiki-aspect-ci
          (cd /tmp/slovowiki-aspect-ci && find . -type f -print0 | sort -z | xargs -0 sha256sum) > /tmp/export-tree-a.sha256
          cargo run --release -- export --out /tmp/slovowiki-aspect-ci
          (cd /tmp/slovowiki-aspect-ci && find . -type f -print0 | sort -z | xargs -0 sha256sum) > /tmp/export-tree-b.sha256
          diff -u /tmp/export-tree-a.sha256 /tmp/export-tree-b.sha256
          git diff --exit-code -- data/novel-words.tsv data/score-calibration.json
      - name: Inflection full-corpus guard
        run: cargo run --release -- inflect-eval
      # Tracked translation probe (V13 item 3): a REPORTED metric, never a
      # gate — the step prints the verified/generated-only/miss counts
      # against the recorded baseline and always succeeds on movement.
      - name: Translation probe (reported metric)
        run: cargo run --release -- translation-probe --site /tmp/slovowiki-aspect-ci
      # Pinnable-release guard 1 of 2 (V14 item 4 / #74): the committed
      # manifest must match the tree — every event, hard failure.
      - name: Verify data manifest
        run: cargo run --release -- data-manifest
      # Guard 2 of 2: an official-dictionary change must carry a
      # refresh-changelog entry (docs/DATA-REFRESH.md). PR-only — on master
      # pushes FETCH_HEAD == HEAD made it vacuous anyway (direct pushes
      # bypass by design; the repo merges via PRs). V14.2 hardening: with
      # pipefail unset a git 128 inside `if !` or behind a pipe still
      # masqueraded as the policy error, so exit codes are now inspected
      # explicitly (1 = changed, >1 = git failure AS a git failure), the
      # name list goes through a file instead of a pipe, and a fetch
      # failure warns-and-skips — the manifest step above still hard-fails
      # real drift. Two-dot FETCH_HEAD diff: shallow-safe, refspec-safe.
      - name: Refresh changelog guard
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          if ! git fetch origin master --depth=1; then
            echo "::warning::cannot fetch base master — changelog guard skipped (manifest guard still ran)"
            exit 0
          fi
          set +e
          git diff --quiet FETCH_HEAD HEAD -- data/official-isv.csv
          rc=$?
          set -e
          if [ "$rc" -gt 1 ]; then
            echo "::error::git diff failed (exit $rc) — this is a git problem, not a changelog-policy violation"
            exit "$rc"
          fi
          if [ "$rc" -eq 1 ]; then
            git diff --name-only FETCH_HEAD HEAD > /tmp/changed-files.txt
            grep -q '^data/refresh-changelog.md$' /tmp/changed-files.txt \
              || { echo "::error::data/official-isv.csv changed without a refresh-changelog entry (see docs/DATA-REFRESH.md)"; exit 1; }
          fi
      - name: Accuracy regression floor (exact top-1 must stay >= 39.5%)
        run: |
          out=$(cargo run --release -- evaluate)
          echo "$out" | tail -12
          exact=$(echo "$out" | grep -oE 'exact top-1 [0-9]+\.[0-9]+%' | tail -1 | grep -oE '[0-9]+\.[0-9]+')
          echo "measured exact top-1 = ${exact}%"
          awk -v e="$exact" 'BEGIN { exit !(e + 0 >= 39.5) }' \
            || { echo "::error::exact top-1 ${exact}% fell below the 39.5% regression floor"; exit 1; }
          git diff --exit-code -- data/score-calibration.json target/eval/methodology.md
